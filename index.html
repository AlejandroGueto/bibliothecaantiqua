<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latinitatis PRO | Bibliotheca Magna v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+Display:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --marble: #FDFCF8; --terracotta: #8B322C; --gold: #C5A059; --ink: #1A1A1A; }
        body { font-family: 'Noto Serif Display', serif; background-color: var(--marble); color: var(--ink); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); scroll-behavior: smooth; }
        .ancient { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
        .greek-display { font-family: 'Playfair Display', serif; }
        
        .word-token { display: inline-block; padding: 0 4px; cursor: pointer; transition: all 0.2s; border-radius: 4px; position: relative; }
        .word-token:hover { color: var(--terracotta); background: rgba(139, 50, 44, 0.05); }
        .reading-now { background: var(--gold) !important; color: white !important; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); transform: scale(1.15); z-index: 10; }

        .drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .trans-card { background: white; padding: 1.5rem; border-radius: 1rem; border-top: 4px solid var(--terracotta); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .progress-container { width: 100%; background: #e5e5e5; border-radius: 8px; height: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s linear; }
        
        .home-card { background: white; padding: 2rem; border-radius: 1.5rem; border: 1px solid #eaeaea; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.2s; }
        .home-card:hover { transform: translateY(-5px); border-color: var(--gold); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-4 md:px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="showHome()">
            <div class="w-10 h-10 bg-stone-900 text-white rounded-lg flex items-center justify-center font-bold shadow-xl hover:bg-stone-800 transition-colors">ΑΩ</div>
            <h1 class="ancient text-lg font-black text-stone-800 uppercase hidden md:block tracking-tighter">Latinitatis <span class="text-red-800">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleCodex(true)" class="flex items-center gap-2 px-3 md:px-4 py-2 bg-stone-100 hover:bg-stone-200 rounded-full transition-all text-stone-700" title="Mi Códice (Favoritos)">
                <i data-lucide="bookmark" class="w-4 h-4 text-terracotta"></i><span class="ancient text-[10px] font-bold uppercase hidden md:inline">Mi Códice</span>
            </button>
            <button onclick="openDictionary()" class="flex items-center gap-2 px-3 md:px-4 py-2 bg-stone-100 hover:bg-stone-200 rounded-full transition-all text-stone-700">
