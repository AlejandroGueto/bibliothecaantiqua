<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latinitatis Pro | Bibliotheca Magna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+Display:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --marble: #FDFCF8; --terracotta: #8B322C; --gold: #C5A059; --ink: #1A1A1A; }
        body { font-family: 'Noto Serif Display', serif; background-color: var(--marble); color: var(--ink); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); overflow-x: hidden; }
        .ancient { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        .greek-display { font-family: 'Playfair Display', serif; }
        .word-token { display: inline-block; padding: 2px 4px; cursor: pointer; transition: all 0.2s; border-radius: 4px; }
        .word-token:hover { background: rgba(139, 50, 44, 0.1); color: var(--terracotta); }
        .active-word { color: var(--terracotta) !important; font-weight: 700; background: rgba(139, 50, 44, 0.08); box-shadow: 0 2px 0 var(--gold); }
        .reading-now { background: var(--gold); color: white !important; border-radius: 4px; transform: scale(1.05); }
        .drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .trans-card { background: white; padding: 1.25rem; border-radius: 1.5rem; border-top: 3px solid var(--terracotta); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="resetApp()">
            <div class="w-10 h-10 bg-stone-900 text-white rounded-lg flex items-center justify-center font-bold shadow-xl">Λ</div>
            <h1 class="ancient text-lg font-black text-stone-800 uppercase hidden md:block">Latinitatis <span class="text-red-800">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleIndex()" class="p-2.5 hover:bg-stone-100 rounded-full"><i data-lucide="book-open"></i></button>
            <button onclick="toggleNotes()" class="p-2.5 hover:bg-stone-100 rounded-full text-amber-600"><i data-lucide="scroll"></i></button>
            <button onclick="generateExercise()" class="p-2.5 bg-stone-900 text-white rounded-full hover:bg-red-800 transition-all"><i data-lucide="brain-circuit"></i></button>
        </div>
    </nav>

    <main id="reader-view" class="flex-1 p-4 md:p-12 max-w-5xl mx-auto w-full">
        <header class="mb-8 text-center">
            <h2 id="view-title" class="greek-display text-4xl md:text-6xl font-black text-stone-900 italic tracking-tight italic">Cargando...</h2>
            <p id="view-meta" class="text-stone-400 ancient text-[10px] mt-2 uppercase tracking-[0.2em]"></p>
        </header>

        <section class="bg-white rounded-[40px] shadow-2xl border border-stone-100 p-8 md:p-16 relative min-h-[400px]">
            <div id="greek-container" class="greek-display text-2xl md:text-4xl leading-[2] text-justify md:text-center transition-all duration-500"></div>
            
            <div class="mt-12 pt-8 border-t border-stone-50 flex flex-wrap justify-center items-center gap-6">
                <button onclick="playVoice()" id="play-btn" class="flex items-center gap-3 px-10 py-4 bg-stone-900 text-white rounded-full ancient text-xs font-bold uppercase shadow-xl hover:bg-black transition-all">
                    <i data-lucide="play" id="play-icon"></i> Escuchar
                </button>
                <button onclick="toggleTranslations()" class="px-6 py-4 border-2 border-red-800 text-red-800 rounded-full ancient text-xs font-bold uppercase hover:bg-red-50 transition-all">Comparativa</button>
            </div>
            <div id="trans-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mt-10 animate-in slide-in-from-bottom-4"></div>
            <div id="exercise-area" class="hidden mt-8 p-6 bg-stone-900 text-white rounded-3xl animate-in zoom-in-95"></div>
        </section>
    </main>

    <div id="notes-drawer" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-[200] translate-x-full drawer p-8 overflow-y-auto border-l border-stone-200">
        <div class="flex justify-between items-center mb-8"><h3 class="ancient text-xl font-bold">Mi Códice</h3><button onclick="toggleNotes()"><i data-lucide="x"></i></button></div>
        <div id="notes-list" class="space-y-4"></div>
    </div>

    <div id="drawer" class="fixed inset-y-0 right-0 w-full md:w-[480px] bg-white shadow-2xl z-[200] translate-x-full drawer p-10 overflow-y-auto">
        <button onclick="closeDrawer()" class="flex items-center gap-3 text-stone-300 hover:text-red-800 mb-8 font-black uppercase text-[10px]"><i data-lucide="arrow-left"></i> Regresar</button>
        <div id="drawer-content"></div>
    </div>

    <div id="index-drawer" class="fixed inset-y-0 left-0 w-full md:w-[400px] bg-white shadow-2xl z-[200] -translate-x-full drawer p-10 overflow-y-auto border-r border-stone-200">
        <div id="index-content" class="space-y-8"></div>
    </div>

    <script>
        let currentPassage = null, audioRate = 0.8, isSpeaking = false;

        const classicalIndex = [
            { author: "Homero", works: [{ title: "Ilíada", meta: "Canto I, 1-7", content: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος οὐλομένην, ἣ μυρί᾽ Ἀχαιοῖς ἄλγε᾽ ἔθηκε, πολλὰς δ᾽ ἰφθίμους ψυχὰς Ἄϊδι προΐαψεν ἡρώων, αὐτοὺς δὲ ἑλώρια τεῦχε κύνεσσιν οἰωνοῖσί τε πᾶσι, Διὸς δ᾽ ἐτελείετο βουλή, ἐξ οὗ δὴ τὰ πρῶτα διαστήτην ἐρίσαντε Ἀτρεΐδης τε ἄναξ ἀνδρῶν καὶ δῖος Ἀχιλλεύς.", translations: [{ lang: "ES", text: "Canta, oh diosa, la cólera del Pelida Aquiles...", author: "E. Crespo" }] }] }
        ];

        window.onload = () => { lucide.createIcons(); renderIndex(); loadNotes(); resetApp(); };

        function renderIndex() {
            document.getElementById('index-content').innerHTML = classicalIndex.map((a, ai) => `
                <div class="mb-6"><h3 class="ancient text-red-800 border-b mb-3 font-bold uppercase text-[10px] tracking-widest">${a.author}</h3>
                ${a.works.map((w, wi) => `<button onclick="loadWork(${ai},${wi})" class="block w-full text-left p-3 hover:bg-red-50 rounded-xl font-bold text-stone-700 text-sm transition-all">${w.title}</button>`).join('')}</div>
            `).join('');
        }

        async function callOráculo(promptText) {
            let apiKey = localStorage.getItem('gemini_key');
            
            if (!apiKey) {
                apiKey = prompt("🏛️ Pega tu Clave API de Google:");
                if (!apiKey) throw new Error("Cancelado por el usuario.");
                localStorage.setItem('gemini_key', apiKey.trim());
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] }) 
            });

            const data = await res.json();

            // AQUÍ ESTÁ LA VERDAD: Si falla, mostramos el error EXACTO de Google, y NO borramos la clave.
            if (!res.ok) {
                console.error("Error de la API:", data);
                throw new Error(data.error?.message || JSON.stringify(data));
            }

            // Limpiar la respuesta para asegurar que es JSON válido por si Gemini mete texto extra
            let textRes = data.candidates[0].content.parts[0].text;
            textRes = textRes.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
            
            return JSON.parse(textRes);
        }

        async function analyzeWord(word, el) {
            document.querySelectorAll('.word-token').forEach(x => x.classList.remove('active-word')); el.classList.add('active-word');
            document.getElementById('drawer').classList.remove('translate-x-full');
            document.getElementById('drawer-content').innerHTML = "<div class='py-20 text-center animate-pulse ancient text-stone-300'>Consultando Escolios...</div>";
            
            try {
                const res = await callOráculo(`Analiza la palabra "${word}". Devuelve SOLO un objeto JSON estricto con esta estructura, sin texto adicional: {"lema":"palabra","morfologia":"tipo","traduccion":"significado","etimologia":"origen"}`);
                
                document.getElementById('drawer-content').innerHTML = `
                    <span class="text-[10px] ancient uppercase font-bold text-red-800 tracking-widest">Morphologia</span>
                    <h3 class="greek-display text-5xl my-6 text-stone-900">${word}</h3>
                    <div class="space-y-8">
                        <div><p class="text-3xl font-black text-stone-800">${res.lema}</p><p class="text-sm italic text-stone-400 font-serif">${res.morfologia}</p></div>
                        <div class="bg-red-50 p-8 rounded-[32px] border border-red-100 shadow-inner"><p class="text-4xl italic text-stone-900 font-black">"${res.traduccion}"</p></div>
                        <div class="p-6 bg-stone-50 rounded-2xl"><p class="text-[10px] ancient uppercase mb-2 text-stone-400 text-xs">Huella en Español</p><p class="text-sm text-stone-600 font-serif">${res.etimologia}</p></div>
                    </div>`;
            } catch (e) { 
                // AHORA IMPRIMIMOS EL MENSAJE REAL DEL ASESINO EN LA PANTALLA
                document.getElementById('drawer-content').innerHTML = `
                    <div class='py-10 text-center'>
                        <p class='text-red-600 font-bold mb-4 uppercase tracking-widest text-xs'>Error del servidor</p>
                        <p class='text-stone-800 font-mono text-sm bg-stone-100 p-4 rounded-xl text-left overflow-x-auto'>${e.message}</p>
                        <button onclick='localStorage.removeItem("gemini_key"); alert("Clave borrada. Recarga la página.");' class='mt-8 text-xs underline text-stone-400 hover:text-stone-900'>Borrar clave de memoria y empezar de cero</button>
                    </div>`;
            }
        }

        function loadWork(ai, wi) { currentPassage = classicalIndex[ai].works[wi]; currentPassage.author = classicalIndex[ai].author; renderText(); toggleIndex(); }
        function renderText() { 
            document.getElementById('view-title').innerText = currentPassage.title; 
            document.getElementById('view-meta').innerText = `${currentPassage.author} • ${currentPassage.meta}`;
            document.getElementById('greek-container').innerHTML = currentPassage.content.split(' ').map(w => `<span class="word-token" onclick="analyzeWord('${w.replace(/[.,·;:]/g,'')}', this)">${w}</span>`).join(' '); 
        }
        function toggleIndex() { document.getElementById('index-drawer').classList.toggle('-translate-x-full'); }
        function toggleNotes() { document.getElementById('notes-drawer').classList.toggle('translate-x-full'); }
        function resetApp() { currentPassage = classicalIndex[0].works[0]; currentPassage.author = "Homero"; renderText(); }
        function closeDrawer() { document.getElementById('drawer').classList.add('translate-x-full'); }
        function playVoice() {} function generateExercise() {} function toggleTranslations() {} function loadNotes() {}
    </script>
</body>
</html>
